      document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        let gameKey = urlParams.get("game");

        // إذا لم يكن هناك بارامتر، نختار pubg كافتراضي
        if (!gameKey || !categoriesDatabase[gameKey]) {
          gameKey = "pubg";
        }

        const category = categoriesDatabase[gameKey];

        // تحديث العناوين
        document.getElementById("page-title").innerText =
          `${category.title} | GGhub`;
        document.getElementById("category-title").innerText = category.title;
        document.getElementById("category-bg").src = category.banner;

        // حقن الكروت وتنسيقها بنفس تصميم المظهر الاحترافي
        const grid = document.getElementById("cards-grid");
        grid.innerHTML = "";

        category.items.forEach((item) => {
          let tagHtml = item.tag
            ? `<div class="absolute top-3 right-3 bg-purple-600 text-white text-xs font-bold px-2 py-1 rounded shadow">${item.tag}</div>`
            : "";
          let oldPriceHtml = item.oldPrice
            ? `<span class="text-gray-500 line-through text-xs">${item.oldPrice}</span>`
            : "";

          // السطرين دول جداد: بنجهز كود اللوجو أو النص
          let logoOrTextHtml = category.logo
            ? `<img src="${category.logo}" alt="${category.title}" class="h-10 w-auto mb-4 object-contain" />`
            : `<p class="text-gray-400 text-sm mb-4">${category.title}</p>`;

          grid.innerHTML += `
            <a href="game-details.html?id=${item.id}" class="bg-brand-card rounded-2xl overflow-hidden shadow-lg border border-gray-800 hover:border-yellow-500/80 hover:shadow-[0_0_20px_rgba(234,179,8,0.3)] transition-all group block cursor-pointer">
              <div class="relative h-56 overflow-hidden">
                <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                ${tagHtml}
              </div>
              <div class="p-5">
                <h3 class="font-bold text-lg text-white line-clamp-1 group-hover:text-yellow-500 transition">${item.name}</h3>

                ${logoOrTextHtml}

                <div class="flex items-center justify-between mt-auto">
                  <div class="flex flex-col">
                    ${oldPriceHtml}
                    <span class="text-xl font-bold text-yellow-500">${item.price}</span>
                  </div>
                  <span class="text-gray-500 group-hover:text-white transition"><i class="fas fa-chevron-left text-sm"></i></span>

      // --- نظام الجزيئات الذهبية الخلفية (نفس الكود الخاص بك لتوحيد التصميم) ---
      const canvas = document.getElementById("particle-canvas");
      const ctx = canvas.getContext("2d");
      let particlesArray = [];
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      class Particle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 2 + 0.5;
          this.speedX = Math.random() * 0.5 - 0.25;
          this.speedY = Math.random() * 1.5 + 0.5;
          this.alpha = Math.random() * 0.7 + 0.3;
        }
        update() {
          this.x += this.speedX;
          this.y -= this.speedY;
          if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
          if (this.y < 0) {
            this.y = canvas.height;
            this.x = Math.random() * canvas.width;
          }
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 215, 0, ${this.alpha})`;
          ctx.fill();
        }
      }
      function initParticles() {
        particlesArray = [];
        const numberOfParticles = Math.floor(
          (canvas.width * canvas.height) / 12000,
        );
        for (let i = 0; i < numberOfParticles; i++)
          particlesArray.push(new Particle());
      }
      function connectParticles() {
        for (let a = 0; a < particlesArray.length; a++) {
          for (let b = a; b < particlesArray.length; b++) {
            let dx = particlesArray[a].x - particlesArray[b].x;
            let dy = particlesArray[a].y - particlesArray[b].y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < 130) {
              ctx.strokeStyle = `rgba(255, 215, 0, ${(1 - distance / 130) * 0.4})`;
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
              ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
              ctx.stroke();
            }
          }
        }
      }
      function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particlesArray.length; i++) {
          particlesArray[i].update();
          particlesArray[i].draw();
        }
        connectParticles();
        requestAnimationFrame(animateParticles);
      }
      resizeCanvas();
      initParticles();
      animateParticles();
      window.addEventListener("resize", () => {
        resizeCanvas();
        initParticles();
      });
