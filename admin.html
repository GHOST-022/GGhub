<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="gg.png" />
    <title>لوحة الإدارة | GGhub</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap");
      body {
        font-family: "Tajawal", sans-serif;
      }
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #111827;
      }
      ::-webkit-scrollbar-thumb {
        background: #8b5cf6;
        border-radius: 5px;
      }
    </style>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: { purple: "#8b5cf6", dark: "#0f172a", card: "#1e293b" },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-black text-gray-100 antialiased overflow-x-hidden">
    <canvas
      id="particle-canvas"
      class="fixed inset-0 pointer-events-none z-[-1]"
    ></canvas>

    <nav
      class="bg-black/80 backdrop-blur-sm border-b border-gray-800 sticky top-0 z-50"
    >
      <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-20">
          <div class="flex items-center cursor-pointer">
            <img
              src="gg.png"
              alt="GGhub Logo"
              class="w-16 h-16 object-contain"
            />
            <span class="font-black text-4xl tracking-wider"
              >GG<span class="text-yellow-500">hub</span>
              <span class="text-blue-500 text-3xl font-bold mr-2"
                >Dashboard</span
              ></span
            >
          </div>

          <div class="flex items-center gap-6">
            <a
              href="index.html"
              class="text-gray-300 hover:text-white transition font-bold text-sm"
            >
              <i class="fas fa-store ml-1"></i> العودة للمتجر
            </a>
            <button
              id="logout-btn"
              class="text-gray-400 hover:text-red-400 transition text-sm font-bold flex items-center gap-2"
            >
              <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container mx-auto px-4 py-12 relative z-10">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
        <div
          class="bg-brand-card p-6 rounded-2xl border border-gray-800 flex items-center justify-between shadow-lg shadow-purple-600/5"
        >
          <div>
            <p class="text-gray-300 text-sm font-bold mb-1">إجمالي الطلبات</p>
            <h3 id="stat-total-orders" class="text-3xl font-black text-white">
              0
            </h3>
          </div>
          <div
            class="w-12 h-12 bg-purple-500/20 text-purple-400 rounded-xl flex items-center justify-center text-xl"
          >
            <i class="fas fa-shopping-bag"></i>
          </div>
        </div>

        <div
          class="bg-brand-card p-6 rounded-2xl border border-gray-800 flex items-center justify-between shadow-lg shadow-yellow-500/5"
        >
          <div>
            <p class="text-gray-300 text-sm font-bold mb-1">
              الطلبات قيد انتظار الدفع
            </p>
            <h3
              id="stat-pending-orders"
              class="text-3xl font-black text-yellow-500"
            >
              0
            </h3>
          </div>
          <div
            class="w-12 h-12 bg-yellow-500/20 text-yellow-400 rounded-xl flex items-center justify-center text-xl"
          >
            <i class="fas fa-clock"></i>
          </div>
        </div>

        <div
          class="bg-brand-card p-6 rounded-2xl border border-gray-800 flex items-center justify-between shadow-lg shadow-green-500/5"
        >
          <div>
            <p class="text-gray-300 text-sm font-bold mb-1">
              إجمالي المبيعات المكتملة
            </p>
            <h3
              id="stat-total-revenue"
              class="text-3xl font-black text-green-400"
            >
              $0.00
            </h3>
          </div>
          <div
            class="w-12 h-12 bg-green-500/20 text-green-400 rounded-xl flex items-center justify-center text-xl"
          >
            <i class="fas fa-dollar-sign"></i>
          </div>
        </div>
      </div>

      <section
        class="bg-brand-card rounded-2xl border border-gray-800 overflow-hidden shadow-2xl"
      >
        <div
          class="p-6 border-b border-gray-800 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"
        >
          <div>
            <h2 class="text-xl font-bold text-white">إدارة طلبات العملاء</h2>
            <p class="text-gray-400 text-xs mt-1">
              متابعة العمليات وتحديث الحالات فورياً
            </p>
          </div>
          <div class="flex items-center gap-3 w-full sm:w-auto">
            <input
              type="date"
              id="date-filter"
              onchange="loadDashboardData()"
              class="bg-gray-900 border border-gray-700 text-white rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-purple-500 transition"
            />
            <button
              onclick="loadDashboardData()"
              class="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-white font-bold py-2 px-4 rounded-xl transition flex items-center gap-2 text-sm whitespace-nowrap"
            >
              <i class="fas fa-sync-alt"></i> تحديث
            </button>
          </div>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-right border-collapse">
            <thead>
              <tr
                class="bg-gray-900/50 text-white/80 text-sm font-bold border-b border-gray-800"
              >
                <th class="p-4">رقم الطلب</th>
                <th class="p-4">تاريخ ووقت الطلب</th>
                <th class="p-4">بريد العميل</th>
                <th class="p-4">العناصر المطلوبة</th>
                <th class="p-4">حالة الدفع</th>
                <th class="p-4">طريقة الدفع</th>
                <th class="p-4">الإجمالي</th>
              </tr>
            </thead>
            <tbody id="orders-rows" class="divide-y divide-gray-800/60 text-sm">
              <tr>
                <td colspan="7" class="p-8 text-center text-gray-500">
                  جاري جلب البيانات من السيرفر...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <div
      id="toast-container"
      class="fixed bottom-5 left-5 z-50 flex flex-col gap-3 pointer-events-none"
    ></div>

    <script>
      // ربط السيرفر والبيانات بنفس الإعدادات السابقة الخاصة بك
      const supabaseUrl = "https://tmwgcggwuzwlfaalnazm.supabase.co";
      const supabaseKey = "sb_publishable_1wLvvdMqd-H1PuROGYOllw_vEj2_pr2";
      const supabaseClient = window.supabase.createClient(
        supabaseUrl,
        supabaseKey,
      );

      document.addEventListener("DOMContentLoaded", () => {
        checkAdminAuth();
      });

      // التحقق من صلاحية المستخدم الحالي
      async function checkAdminAuth() {
        const {
          data: { user },
        } = await supabaseClient.auth.getUser();

        // التحقق من وجود المستخدم وأن بريده يطابق بريد الأدمن
        if (!user || user.email !== "admin@gmail.com") {
          showToast("غير مصرح لك بالدخول. هذه اللوحة مخصصة للأدمن فقط.", true);
          setTimeout(() => {
            window.location.href = "index.html";
          }, 3500); // الانتظار ثانية ونصف قبل التوجيه لتظهر الرسالة
          return;
        }
        loadDashboardData();
      }

      // تسجيل الخروج للعودة للموقع الرئيسي
      document
        .getElementById("logout-btn")
        .addEventListener("click", async () => {
          await supabaseClient.auth.signOut();
          window.location.href = "index.html";
        });

      // جلب البيانات من جدول orders مع حساب الإحصائيات بشكل آلي
      async function loadDashboardData() {
        const rowsContainer = document.getElementById("orders-rows");
        rowsContainer.innerHTML = `
          <tr>
            <td colspan="7" class="p-8 text-center text-gray-400">
              <i class="fas fa-circle-notch fa-spin text-purple-500 text-xl ml-2"></i> جاري تحديث البيانات...
            </td>
          </tr>
        `;

        try {
          let query = supabaseClient
            .from("orders")
            .select("*")
            .order("created_at", { ascending: false });

          const filterDate = document.getElementById("date-filter").value;
          if (filterDate) {
            // فلتر لجلب طلبات اليوم المحدد فقط (من بداية اليوم لنهايته)
            const startDate = `${filterDate}T00:00:00.000Z`;
            const endDate = `${filterDate}T23:59:59.999Z`;
            query = query
              .gte("created_at", startDate)
              .lte("created_at", endDate);
          }

          const { data: orders, error } = await query;

          if (error) throw error;

          renderStats(orders);
          renderTable(orders);
        } catch (error) {
          console.error("Dashboard Fetch Error:", error);
          rowsContainer.innerHTML = `
            <tr>
              <td colspan="7" class="p-8 text-center text-red-400 font-bold">
                خطأ أثناء جلب البيانات: ${error.message}
              </td>
            </tr>
          `;
        }
      }

      // معالجة وحساب بطاقات الإحصائيات
      function renderStats(orders) {
        let totalOrders = orders.length;
        let pendingOrders = 0;
        let totalRevenue = 0;

        orders.forEach((order) => {
          if (order.status === "pending") pendingOrders++;
          if (order.status === "completed")
            totalRevenue += parseFloat(order.total_price) || 0;
        });

        document.getElementById("stat-total-orders").innerText = totalOrders;
        document.getElementById("stat-pending-orders").innerText =
          pendingOrders;
        document.getElementById("stat-total-revenue").innerText =
          `$${totalRevenue.toFixed(2)}`;
      }

      // بناء وتحديث صفوف الجدول بشكل ديناميكي
      function renderTable(orders) {
        const rowsContainer = document.getElementById("orders-rows");
        if (orders.length === 0) {
          rowsContainer.innerHTML = `
            <tr>
              <td colspan="7" class="p-8 text-center text-gray-500">لا توجد أي طلبات مسجلة في النظام حالياً.</td>
            </tr>
          `;
          return;
        }

        rowsContainer.innerHTML = "";
        orders.forEach((order, index) => {
          let rowColorClass =
            index % 2 === 0 ? "bg-transparent" : "bg-gray-800/60";
          let itemsHtml = `<div class="text-xs text-gray-600">لا توجد بيانات</div>`;
          if (
            order.items &&
            Array.isArray(order.items) &&
            order.items.length > 0
          ) {
            let listHtml = order.items
              .map((item, index) => {
                // التحقق إذا كان المفتاح تم تسليمه مسبقاً (سيتم حفظها في قاعدة البيانات)
                const isChecked = item.delivered ? "checked" : "";
                return `
                <label class="flex items-center gap-2 cursor-pointer mb-1 hover:bg-gray-800/50 p-1 rounded transition">
                  <input type="checkbox" id="chk-${order.id}-${index}" ${isChecked} class="w-4 h-4 text-purple-600 bg-gray-900 border-gray-700 rounded focus:ring-purple-500">
                  <span class="font-bold text-xs text-purple-300">${item.name}</span>
                </label>
              `;
              })
              .join("");

            // إضافة زر الحفظ تحت القائمة الخاصة بالطلب ده
            itemsHtml = `
              <div class="flex flex-col gap-2">
                <div>${listHtml}</div>
                <button onclick="saveDeliveryStatus('${order.id}')" class="bg-purple-600/20 hover:bg-purple-600 text-purple-400 hover:text-white transition text-xs font-bold px-3 py-1.5 rounded-lg border border-purple-500/30 w-fit">
                  <i class="fas fa-save ml-1"></i> حفظ التسليم
                </button>
              </div>
            `;
          }

          let statusBadge = "";
          if (order.status === "pending") {
            statusBadge = `<span class="bg-yellow-500/10 text-yellow-500 text-xs px-2.5 py-1 rounded-full font-bold border border-yellow-500/20">قيد الانتظار</span>`;
          } else if (order.status === "completed") {
            statusBadge = `<span class="bg-green-500/10 text-green-400 text-xs px-2.5 py-1 rounded-full font-bold border border-green-500/20">مكتمل</span>`;
          } else {
            statusBadge = `<span class="bg-gray-800 text-gray-400 text-xs px-2.5 py-1 rounded-full font-bold">${order.status}</span>`;
          }

          const orderDate = new Date(order.created_at).toLocaleString("en-EG", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            hour12: true,
            timeZone: "UTC",
          });

          rowsContainer.innerHTML += `
            <tr class="${rowColorClass} hover:bg-purple-900/20 transition duration-200 border-b border-gray-800/50">
              <td class="p-4 font-mono text-xs text-gray-500">${order.id.substring(0, 8)}...</td>
              <td class="p-4 text-xs text-gray-300" dir="ltr">${orderDate}</td>
              <td class="p-4 font-medium text-white">${order.customer_email || "زائر"}</td> 
              <td class="p-4">${itemsHtml}</td>
              <td class="p-4">${statusBadge}</td>
              <td class="p-4 text-xs font-bold uppercase text-gray-400">${order.payment_method || "—"}</td> 
              <td class="p-4 font-bold text-yellow-500">$${parseFloat(order.total_price).toFixed(2)}</td>
            </tr>
          `;
        });
      }

      // دالة تحديث الحالات مباشرة للسيرفر دون الحاجة للوحة التحكم الافتراضية
      async function updateStatus(orderId, newStatus) {
        try {
          const { error } = await supabaseClient
            .from("orders")
            .update({ status: newStatus })
            .eq("id", orderId);

          if (error) throw error;

          showToast("تم تحديث حالة الطلب بنجاح");
          loadDashboardData();
        } catch (error) {
          console.error("Error updating status:", error);
          showToast("فشل تحديث الحالة: " + error.message, true);
        }
      }

      // دالة لحفظ حالة تسليم المفاتيح (Checkboxes) في قاعدة البيانات
      async function saveDeliveryStatus(orderId) {
        showToast("جاري حفظ التحديث...");
        try {
          // 1. جلب بيانات الطلب الحالية
          const { data: orderData, error: fetchError } = await supabaseClient
            .from("orders")
            .select("items")
            .eq("id", orderId)
            .single();

          if (fetchError) throw fetchError;

          let currentItems = orderData.items || [];

          // 2. المرور على العناصر وتحديث حالة delivered بناءً على الـ Checkboxes
          currentItems = currentItems.map((item, index) => {
            const checkbox = document.getElementById(`chk-${orderId}-${index}`);
            if (checkbox) {
              item.delivered = checkbox.checked;
            }
            return item;
          });

          // 3. رفع التحديث لقاعدة البيانات
          const { error: updateError } = await supabaseClient
            .from("orders")
            .update({ items: currentItems })
            .eq("id", orderId);

          if (updateError) throw updateError;

          showToast("تم حفظ حالة تسليم المفاتيح بنجاح!");
          loadDashboardData();
        } catch (error) {
          console.error("Error saving delivery status:", error);
          showToast("فشل الحفظ: " + error.message, true);
        }
      }

      function showToast(message, isError = false) {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");

        // تغيير الألوان والأيقونة بناءً على نوع الإشعار
        const borderColor = isError
          ? "border-red-500/50"
          : "border-purple-500/50";
        const iconBg = isError
          ? "bg-red-500/20 text-red-400"
          : "bg-green-500/20 text-green-400";
        const iconClass = isError
          ? "fas fa-exclamation-triangle"
          : "fas fa-check";

        toast.className = `bg-gray-800 border ${borderColor} text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 pointer-events-auto transition-all duration-300 transform translate-x-full opacity-0`;

        toast.innerHTML = `
          <div class="${iconBg} rounded-full w-8 h-8 flex items-center justify-center flex-shrink-0">
            <i class="${iconClass}"></i>
          </div>
          <div class="text-sm font-bold">${message}</div>
        `;

        container.appendChild(toast);
        setTimeout(() => {
          toast.classList.remove("translate-x-full", "opacity-0");
        }, 10);
        setTimeout(() => {
          toast.classList.add("translate-x-full", "opacity-0");
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // --- نظام الجزيئات الذهبية الخلفية لتوحيد التصميم والمظهر الفاخر ---
      const canvas = document.getElementById("particle-canvas");
      const ctx = canvas.getContext("2d");
      let particlesArray = [];
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      class Particle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 2 + 0.5;
          this.speedX = Math.random() * 0.5 - 0.25;
          this.speedY = Math.random() * 1.5 + 0.5;
          this.alpha = Math.random() * 0.7 + 0.3;
        }
        update() {
          this.x += this.speedX;
          this.y -= this.speedY;
          if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
          if (this.y < 0) {
            this.y = canvas.height;
            this.x = Math.random() * canvas.width;
          }
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 215, 0, ${this.alpha})`;
          ctx.fill();
        }
      }
      function initParticles() {
        particlesArray = [];
        const numberOfParticles = Math.floor(
          (canvas.width * canvas.height) / 12000,
        );
        for (let i = 0; i < numberOfParticles; i++)
          particlesArray.push(new Particle());
      }
      function connectParticles() {
        for (let a = 0; a < particlesArray.length; a++) {
          for (let b = a; b < particlesArray.length; b++) {
            let dx = particlesArray[a].x - particlesArray[b].x;
            let dy = particlesArray[a].y - particlesArray[b].y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < 130) {
              ctx.strokeStyle = `rgba(255, 215, 0, ${(1 - distance / 130) * 0.4})`;
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
              ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
              ctx.stroke();
            }
          }
        }
      }
      function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particlesArray.length; i++) {
          particlesArray[i].update();
          particlesArray[i].draw();
        }
        connectParticles();
        requestAnimationFrame(animateParticles);
      }
      resizeCanvas();
      initParticles();
      animateParticles();
      window.addEventListener("resize", () => {
        resizeCanvas();
        initParticles();
      });
    </script>
  </body>
</html>
